<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net">
  <title>Employee Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .login-box {
      max-width: 450px;
      margin-top: 5rem;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container">
    <div class="login-box bg-white p-4 rounded shadow mx-auto">
      <h2 class="text-center mb-4">Employee Login</h2>
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('employee_login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="mb-3">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" 
                 name="name" 
                 id="name"
                 class="form-control" 
                 placeholder="Enter your name" 
                 required
                 autocomplete="username">
        </div>
        
        <div class="mb-3">
          <label for="passcode" class="form-label">Passcode</label>
          <input type="password" 
                 name="passcode" 
                 id="passcode"
                 class="form-control" 
                 placeholder="Enter your passcode" 
                 required
                 autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>

      <div class="mt-3 text-center">
        <a href="{{ url_for('register') }}" class="text-decoration-none me-3">Create Account</a>
        <a href="{{ url_for('admin_login') }}" class="text-decoration-none">Admin Login</a>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
